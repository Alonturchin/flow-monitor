services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - NPM_CONFIG_REGISTRY=https://registry.npmjs.org
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      # These override .env.local values with Docker-specific network settings
      - DATABASE_URL=postgresql://flowmonitor:password@db:5432/flowmonitor
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: flowmonitor
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flowmonitor
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flowmonitor -d flowmonitor']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_dev_data:
